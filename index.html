<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Una flor para mi hermosa flor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Texto superior -->
    <h1 class="titulo">Una flor para mi hermosa flor</h1>

    <!-- Contenedor principal -->
    <div class="contenedor">

        <!-- Flor principal -->
        <div class="flor" id="florPrincipal">
            <!-- Centro de la flor -->
            <div class="centro"></div>

            <!-- Pétalos (se generarán más con JS luego) -->
            <div class="petalos"></div>
        </div>

        <!-- Nota (mensaje personalizado) -->
        <div class="nota" id="nota">
            <!-- AQUÍ PONES TU MENSAJE -->
            <p>Escribe aquí tu mensaje especial...</p>
        </div>

    </div>

    <!-- Contenedor para flores extra que aparecerán -->
    <div id="floresExtra"></div>

    <!-- Audio -->
    <audio id="musica" src="tu-musica.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
